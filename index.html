<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Portal | Velocidade Máxima</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">F1 PORTAL</div>
        <nav>
            <a href="#noticias">Notícias</a>
            <a href="#classificacao">Classificação</a>
            <button id="theme-toggle">Alternar Modo</button>
        </nav>
    </header>

    <section class="hero">
        <h1 id="main-title">Fórmula 1 2024</h1>
        <p>A emoção da velocidade em tempo real.</p>
    </section>

    <main class="container" id="noticias">
        <!-- Os cards de notícias -->
        <article class="card">
            <div class="card-content">
                <span class="tag">Destaque</span>
                <h3>GP de Interlagos</h3>
                <p>Tudo pronto para a maior festa do automobilismo brasileiro.</p>
                <button class="btn-like">❤️ Curtir</button>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 F1 Portal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
